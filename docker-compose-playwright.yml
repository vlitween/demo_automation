services:
  playwright-service:
    image: mcr.microsoft.com/playwright:v1.58.0-jammy
    container_name: playwright-service
    ports:
      - "8080:8080"
    command: >
      /bin/bash -c "npx playwright@1.58.0 run-server --port 8080 --path /"
    restart: unless-stopped
    shm_size: '2gb'

# run command: docker-compose -f docker-compose-playwright.yml up -d
# stop command: docker-compose -f docker-compose-playwright.yml down