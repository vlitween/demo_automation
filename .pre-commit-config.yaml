exclude: |
  (?x)^(
      .gitlab-ci.yml|
      .gitignore|
      .*\.(md)
  )$
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        entry: trailing-whitespace-fixer
        language: python
        types: [text]
      - id: double-quote-string-fixer
      - id: requirements-txt-fixer
      - id: check-merge-conflict
      - id: check-ast
      - id: check-json
      - id: name-tests-test
        args: [--django]
  - repo: https://github.com/pycqa/isort
    rev: 5.13.0
    hooks:
      - id: isort
        language: python
        language_version: python3

  - repo: https://github.com/pycqa/flake8
    rev: '7.1.1'  # pick a git hash / tag to point to
    hooks:
      - id: flake8
        args: ['--max-complexity=50','--ignore=W605, E501, F811, F541']

  # Own hooks
  -   repo: local
      hooks:
      -   id: check-unique-test-names
          name: Check Unique Test Function Names
          description: Check unique function names in pytest
          entry: python -m scripts.pre-commit.check_unique_test_names
          language: python
          types: [python]
          files: ^tests/.*\.py$
