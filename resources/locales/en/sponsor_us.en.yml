en:
  page_title: Sponsor | Selenium
  head_section:
    header: Sponsor
    description_1: The Selenium project is a member of the Software Freedom Conservancy, a 501(c)3 non-profit organization. The Conservancy has allowed us to pool organizational resources with other projects, such as Inkscape, Samba, and Wine, in order to reduce the management overhead associated with creating our own, dedicated legal entity.
    description_2: The majority of sponsorship funds go directly towards supporting the Selenium project, such as server and software expenses. A small portion of the funds are set aside for the Conservancy to continue their work in supporting Selenium and other open source initiatives.
