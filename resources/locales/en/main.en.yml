en:
  page_title: Selenium
  head_section:
    header_1: Selenium automates browsers. That's it!
    header_2: What you do with that power is entirely up to you.
    description_1: Primarily it is for automating web applications for testing purposes, but is certainly not limited to just that.
    description_2: Boring web-based administration tasks can (and should) also be automated as well.
  getting_started:
    title: Getting Started
    webdriver:
      title: Selenium WebDriver
      description: 'If you want to create robust, browser-based regression automation suites and tests, scale and distribute scripts across many environments, then you want to use Selenium WebDriver, a collection of language specific bindings to drive a browser - the way it is meant to be driven.'
      link: READ MORE
    ide:
      title: Selenium IDE
      description: 'If you want to create quick bug reproduction scripts, create scripts to aid in automation-aided exploratory testing, then you want to use Selenium IDE; a Chrome, Firefox and Edge add-on that will do simple record-and-playback of interactions with the browser.'
      link: READ MORE
    grid:
      title: Selenium Grid
      description: 'If you want to scale by distributing and running tests on several machines and manage multiple environments from a central point, making it easy to run the tests against a vast combination of browsers/OS, then you want to use Selenium Grid.'
      link: READ MORE
  news:
    title: News
    read_more_link: Read More
    more_news_link: More news
  donate:
