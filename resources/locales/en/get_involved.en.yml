en:
  page_title: Get Involved | Selenium
  head_section:
    header: Getting Involved
    description: Selenium is certainly a team effort! There are several ways you can help out, whether you are a programmer, designer, QA engineer, writer, project manager, or just willing to help. If you are interested in helping, the best way to connect with us is at the Selenium Developers Group. We will work with you to get you set up to contribute.
