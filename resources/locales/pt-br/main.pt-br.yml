pt-br:
  head_section:
    header_1: Selenium automatiza navegadores. É isso!
    header_2: O que você fará com esse poder é inteiramente consigo.
    description_1: O uso mais normal é automatizar testes para aplicativos web, mas não está limitado a apenas isso.
    description_2: Tarefas aborrecidas de administração baseadas em web também podem (e devem) ser automatizadas.
  getting_started:
    webdriver:
      description: 'Se pretende criar um conjunto de testes de automação para regressão, testes, distribuir scripts por muitos ambientes, então quererá usar Selenium WebDriver, um conjunto de ‘bindings’ específicos para várias linguagens para ‘conduzir’ um navegador web, da forma que foi concebido.'
    ide:
      description: 'Caso queira criar scripts rápidos para reproduzir bugs, ajudar na automação de testes exploratórios, então quererá usar Selenium IDE, um extra para os navegadores Firefox, Chrome e Edge. Com Selenium IDE irá conseguir gravar e reproduzir interacções com o navegador.'
    grid:
      description: 'Se pretende escalar, distribuir e correr testes em várias máquinas e gerir vários ambientes a partir de uma localização central, simplificando a gestão dos testes com várias combinações de sistemas operativos e navegadores, então quererá usar a Selenium Grid.'
