ja:
  head_section:
    header_1: Seleniumはブラウザを自動化します。そうです！
    header_2: その力で何をするかは完全にあなた次第です。
    description_1: 主にテスト目的でWebアプリケーションを自動化するためのものですが、それに限定されるものではありません。
    description_2: 退屈なWebベースの管理タスクも自動化できます（自動化する必要があります）。
  getting_started:
    title: 入門
    webdriver:
      description: '堅牢なブラウザーベースの回帰自動化スイートとテストを作成し、スクリプトをスケーリングして多くの環境に分散する場合は、 言語固有のバインディングのコレクションであるSeleniumWebDriverを使用して意図した操作でブラウザーを駆動します。'
    ide:
      description: '迅速なバグ再現スクリプトを作成したい場合、自動化支援の探索的テストを支援するスクリプトを作成したい場合は、SeleniumIDEを使用します。 Chrome、Firefox、Edgeのアドオンがブラウザとの対話の簡単な記録と再生を行います。'
    grid:
      description: '複数のマシンでテストを分散して実行し、複数の環境を中央から管理して、 ブラウザーとOSの膨大な組み合わせに対してテストを簡単に実行できるようにすることでスケーリングしたい場合は、 SeleniumGridを使用します。'
